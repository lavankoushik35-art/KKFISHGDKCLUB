<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KK FISH CLUB - ADMIN PANEL</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<!-- ===========================
     LOGIN PAGE
=========================== -->

<div class="login-page" id="loginPage">

    <div class="login-box">

        <h1>🐠 KK FISH CLUB</h1>

        <h2>Admin Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            🔐 Login
        </button>

    </div>

</div>

<!-- ===========================
     DASHBOARD
=========================== -->

<div id="dashboard" class="dashboard" style="display:none;">

<header>

<h1>🐠 KK FISH GDK ADMIN PANEL</h1>

<div class="top-buttons">

<button onclick="saveData()">
💾 Save
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

</header>

<!-- Dashboard Cards -->

<div class="cards">

<div class="card">

<h2>Total Fish</h2>

<h1 id="totalFish">14</h1>

</div>

<div class="card">

<h2>Shop Name</h2>

<h3>KK FISH GDK</h3>

</div>

<div class="card">

<h2>Club Name</h2>

<h3>KK FISH CLUB</h3>

</div>

</div>

<!-- Fish Management Starts -->

<section class="fish-management">

<h2>🐟 Fish Management</h2>

<div class="form">

<input
type="text"
id="newFish"
placeholder="Fish Name">

<input
type="number"
id="fishPrice"
placeholder="Price">

<input
type="text"
id="fishOffer"
placeholder="Offer">

<input
type="number"
id="fishStock"
placeholder="Stock">

<input
type="text"
id="fishImage"
placeholder="Image URL">

<button onclick="addFish()">
➕ Add Fish
</button>

</div>

<h2>Fish List</h2>

<table>

<thead>

<tr>

<th>#</th>

<th>Name</th>

<th>Price</th>

<th>Offer</th>

<th>Stock</th>

<th>Action</th>

</tr>

</thead>

<tbody id="fishList">

<!-- Fish List Will Come From JavaScript -->

</tbody><!-- ===========================
     Fish Table Continues
=========================== -->

</tbody>

</table>

</section>

<!-- ===========================
     SETTINGS
=========================== -->

<section class="settings">

<h2>⚙️ Website Settings</h2>

<div class="setting-box">

<label>Club Code</label>

<input
type="text"
id="clubCode"
value="kkfishclub">

<label>Offer Code</label>

<input
type="text"
id="offerCode"
value="123456789">

<label>WhatsApp Number</label>

<input
type="text"
id="whatsappNumber"
value="9381687402">

<button onclick="saveSettings()">

💾 Save Settings

</button>

</div>

</section>

<!-- ===========================
     SOUND SETTINGS
=========================== -->

<section class="settings">

<h2>🔊 Sound Effects</h2>

<div class="setting-box">

<label>

<input
type="checkbox"
id="soundToggle"
checked>

Enable Sound Effects

</label>

<br><br>

<button onclick="testSound()">

▶ Test Sound

</button>

</div>

</section>

<!-- ===========================
     QUICK ACTIONS
=========================== -->

<section class="settings">

<h2>⚡ Quick Actions</h2>

<div class="quick-buttons">

<button onclick="sortFishAZ()">

⬆ Sort A-Z

</button>

<button onclick="sortFishZA()">

⬇ Sort Z-A

</button>

<button onclick="resetFishList()">

🔄 Reset Fish List

</button>

<button onclick="deleteAllFish()">

🗑 Delete All

</button>

</div>

</section>

<!-- ===========================
     FOOTER
=========================== -->

<footer>

<p>

🐠 KK FISH CLUB ADMIN PANEL

</p>

<p>

Developed for KK FISH GDK

</p>

</footer>

</div>

<script src="admin.js"></script>

</body>
</html>
