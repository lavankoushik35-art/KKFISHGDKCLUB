<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK FISH CLUB</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
    <div class="loader-content">
        <div class="fish">🐠</div>
        <h1>KK FISH CLUB</h1>
        <p>Loading...</p>
    </div>
</div>

<!-- Floating Bubbles -->
<div class="bubbles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

<!-- Screen 1 -->
<div class="container active" id="screen1">

<h1>🐠 KK FISH CLUB</h1>

<h3>Welcome</h3>

<input
type="password"
id="clubCode"
placeholder="Enter Club Code">

<button onclick="checkClubCode()">
Next
</button>

</div>

<!-- Screen 2 -->
<div class="container" id="screen2">

<h1>🔑 Offer Code</h1>

<input
type="password"
id="offerCode"
placeholder="Enter OFC Code">

<button onclick="checkOfferCode()">
Submit
</button>

</div>

<!-- Screen 3 -->
<div class="container" id="screen3">

<div class="success">

<div class="tick">
✔
</div>

<h2>Correct Details</h2>

<p>Welcome to KK Fish Club</p>

<button onclick="showFishes()">
Continue
</button>

</div>

</div>

<!-- Screen 4 -->
<div class="container" id="screen4">

<h1>🐠 Fish List</h1>

<div class="fish-grid" id="fishGrid">

</div>

</div>

<script src="script.js"></script>

</body>
</html>
